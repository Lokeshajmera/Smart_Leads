services:
  backend:
    build:
      context: ./backend
    ports:
      - '5000:5000'
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/smart_leads
      - JWT_SECRET=supersecretjwtkeyforleadsdashboard
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - mongo
    restart: always
    command: npm run dev

  frontend:
    build:
      context: ./frontend
    ports:
      - '5173:5173'
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:5000/api
    restart: always
    command: npm run dev -- --host

  mongo:
    image: mongo:latest
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    restart: always

volumes:
  mongo_data:
